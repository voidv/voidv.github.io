  const open = document.createElement('div'); open.className = 'item';
  open.innerHTML = '<span>&#128193;</span><span>Open file...</span>';
  open.onclick = () => { dd.classList.remove('show'); openFile(); };
  dd.appendChild(open);
}

function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-menu.show').forEach(dd => dd.classList.remove('show'));
}
document.addEventListener('click', e => {
  if (e.target.closest('.dropdown')) return;
  closeAllDropdowns();
});

// ══════════════════════════════════════════
//  Bookmarks
// ══════════════════════════════════════════
function getBookmarks() { try { return JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || '{}'); } catch { return {}; } }
function saveBookmarks(b) { try { localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(b)); } catch {} }

function isBookmarked() {
  if (!fileName) return false;
  const all = getBookmarks();
  return (all[fileName] || []).includes(selectedPath || '');
}

function toggleBookmark() {
  if (!fileName || selectedRawValue === undefined) return;
  const all = getBookmarks();
  const key = fileName;
  const list = all[key] || [];
  const path = selectedPath || '';
  const idx = list.indexOf(path);
  if (idx >= 0) { list.splice(idx, 1); showToast('Bookmark removed'); }
  else { list.push(path); showToast('Bookmarked'); }
  all[key] = list;
  saveBookmarks(all);
  updateBookmarkUI();
}

function updateBookmarkUI() {
  const star = document.getElementById('bookmarkStar');
  if (star) {
    const active = isBookmarked();
    star.classList.toggle('active', active);
    star.textContent = active ? '★' : '☆';
  }
  const all = getBookmarks();
  const list = (fileName && all[fileName]) || [];
  const cnt = document.getElementById('bookmarkCount');
  if (cnt) cnt.textContent = list.length ? list.length : '';
}

function toggleBookmarksDropdown(ev) {
  if (ev) ev.stopPropagation();
  const dd = document.getElementById('bookmarksDropdown');
  const willShow = !dd.classList.contains('show');
  closeAllDropdowns();
  if (!willShow) return;
  dd.classList.add('show');
  dd.classList.add('right');
  dd.innerHTML = '';
  const all = getBookmarks();
  const list = (fileName && all[fileName]) || [];
  if (!list.length) {
    const e = document.createElement('div'); e.className = 'empty';
    e.textContent = fileName ? 'Click ☆ in detail header to bookmark a path' : 'Open a file first';
    dd.appendChild(e); return;
  }
  list.forEach(p => {
    const it = document.createElement('div'); it.className = 'item';
    it.innerHTML = `<span>&#9733;</span><span style="flex:1;font-family:monospace;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p || '(root)')}</span><span class="x" title="Remove">&times;</span>`;
    it.onclick = e => {
      if (e.target.classList.contains('x')) {
        e.stopPropagation();
        const a2 = getBookmarks();
        a2[fileName] = (a2[fileName] || []).filter(x => x !== p);
        saveBookmarks(a2);
        updateBookmarkUI();
        toggleBookmarksDropdown(); toggleBookmarksDropdown();
        return;
      }
      const parts = p ? p.split('.') : [];
      navigateToPath(parts);
      dd.classList.remove('show');
    };
    dd.appendChild(it);
  });
}

// ══════════════════════════════════════════
//  Go to path
// ══════════════════════════════════════════
let gotoActiveIdx = 0;
let gotoCands = [];

function showGotoPath() {
  if (!jsonData) return;
  document.getElementById('gotoModal').classList.add('show');
  const inp = document.getElementById('gotoInput');
  inp.value = '';
  setTimeout(() => inp.focus(), 30);
  updateGotoSuggestions();
}

function updateGotoSuggestions() {
  const q = document.getElementById('gotoInput').value.trim();
  const norm = q.replace(/\[(\d+)\]/g, '.$1').replace(/^\./, '').toLowerCase();
  const sg = document.getElementById('gotoSuggestions');
  sg.innerHTML = '';
  let cands = allLines.map(l => l._pathStr).filter(p => p !== undefined && p !== '');
  if (norm) cands = cands.filter(p => p.toLowerCase().includes(norm));
  cands = cands.slice(0, 50);
  gotoCands = cands;
  gotoActiveIdx = 0;
  cands.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'path-suggestion' + (i === 0 ? ' active' : '');
    d.textContent = p;
    d.onclick = () => gotoExecute(p);
    sg.appendChild(d);
  });
  if (!cands.length) {
    const empty = document.createElement('div');
    empty.className = 'path-suggestion'; empty.style.color = 'var(--text-dim)'; empty.style.cursor = 'default';
    empty.textContent = q ? `Press Enter to try "${q}"` : 'No paths yet';
    sg.appendChild(empty);
  }
}

function moveGotoActive(delta) {
  if (!gotoCands.length) return;
  gotoActiveIdx = (gotoActiveIdx + delta + gotoCands.length) % gotoCands.length;
  const sg = document.getElementById('gotoSuggestions');
  sg.querySelectorAll('.path-suggestion').forEach((el, i) => el.classList.toggle('active', i === gotoActiveIdx));
  const active = sg.children[gotoActiveIdx];
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function gotoExecuteActive() {
  if (gotoCands[gotoActiveIdx]) gotoExecute(gotoCands[gotoActiveIdx]);
  else {
    const q = document.getElementById('gotoInput').value.trim();
    if (q) gotoExecute(q);
  }
}

function gotoExecute(p) {
  const norm = String(p).replace(/\[(\d+)\]/g, '.$1').replace(/^\./, '');
  const parts = norm ? norm.split('.').filter(s => s !== '') : [];
  navigateToPath(parts);
  closeModal('gotoModal');
}

// ══════════════════════════════════════════
//  Tree filter by type
// ══════════════════════════════════════════
let currentFilterType = '';

function applyTreeFilter(type) {
  currentFilterType = type;
  if (!type) {
    document.querySelectorAll('.json-line, .json-node').forEach(el => el.style.display = '');
    return;
  }
  // Mark matches
  const matches = new Set();
  allLines.forEach(line => {
    if (getType(line._rawValue) === type) matches.add(line);
  });
  // Hide all lines, then unhide matches and their ancestors
  allLines.forEach(line => { line.style.display = 'none'; });
  matches.forEach(line => {
    line.style.display = '';
    let p = line.parentElement;
    while (p && p.id !== 'jsonContainer') {
      if (p.classList.contains('json-node')) {
        const head = p.querySelector(':scope > .json-line');
        if (head) head.style.display = '';
      }
      if (p.classList.contains('json-children') && p.classList.contains('hidden')) {
        p.classList.remove('hidden');
        const togWrap = p.previousElementSibling;
        if (togWrap) {
          const tog = togWrap.querySelector('.json-toggle');
          if (tog) tog.classList.remove('collapsed');
          const pr = togWrap.querySelector('.json-preview');
          if (pr) pr.style.display = 'none';
        }
      }
      p = p.parentElement;
    }
  });
}

// ══════════════════════════════════════════
//  Edit mode
// ══════════════════════════════════════════
let editMode = false;
const editChanges = new Map();

function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode-on', editMode);
  document.getElementById('editBtn').classList.toggle('active', editMode);
  showToast(editMode ? 'Edit mode on (double-click a value)' : 'Edit mode off');
}

function makeValueEditable(span, line) {
  if (!editMode) return;
  const orig = line._rawValue;
  if (typeof orig === 'object' && orig !== null) return;
  const inp = document.createElement('input');
  inp.className = 'edit-input';
  inp.value = orig === null ? 'null' : String(orig);
  inp.style.width = Math.max(60, Math.min(400, inp.value.length * 8 + 20)) + 'px';
  span.style.display = 'none';
  span.parentNode.insertBefore(inp, span);
  inp.focus(); inp.select();
  let committed = false;
  const cancel = () => { if (committed) return; committed = true; inp.remove(); span.style.display = ''; };
  const commit = () => {
    if (committed) return; committed = true;
    let v = inp.value;
    const t = typeof orig;
    if (t === 'number') { const n = Number(v); if (!isNaN(n)) v = n; else { cancel(); return; } }
    else if (t === 'boolean') v = (v === 'true' || v === '1');
    else if (orig === null) {
      if (v === 'null' || v === '') v = null;
    }
    inp.remove();
    if (v === orig) { span.style.display = ''; return; }
    applyEdit(line, v);
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
}

function applyEdit(line, newValue) {
  const path = line._path || [];
  if (path.length === 0) {
    jsonData = newValue;
  } else {
    let parent = jsonData;
    for (let i = 0; i < path.length - 1; i++) {
      parent = Array.isArray(parent) ? parent[Number(path[i])] : parent[path[i]];
    }
    const last = path[path.length - 1];
    if (Array.isArray(parent)) parent[Number(last)] = newValue;
    else parent[last] = newValue;
  }
  editChanges.set(line._pathStr, true);
  const expanded = saveExpandedState();
  renderJSON(jsonData);
  restoreExpandedState(expanded);
  // Re-mark changed lines
  allLines.forEach(l => { if (editChanges.has(l._pathStr)) l.classList.add('edit-changed'); });
  showToast('Updated (use Copy/Export to save)');
}

function saveExpandedState() {
  const expanded = new Set();
  allToggleNodes.forEach(n => {
    const head = n.toggle.parentElement;
    const ps = head._pathStr;
    if (!n.toggle.classList.contains('collapsed')) expanded.add(ps);
  });
  return expanded;
}
function restoreExpandedState(set) {
  allToggleNodes.forEach(n => {
    const ps = n.toggle.parentElement._pathStr;
    if (!set.has(ps)) {
      n.toggle.classList.add('collapsed');
      n.children.classList.add('hidden');
      n.preview.style.display = 'inline';
    } else {
      n.toggle.classList.remove('collapsed');
      n.children.classList.remove('hidden');
      n.preview.style.display = 'none';
    }
  });
}

// ══════════════════════════════════════════
//  Diff / Compare
// ══════════════════════════════════════════
let diffMap = null;

function openCompareFile() {
  if (!jsonData) { alert('Open a JSON first'); return; }
  if (diffMap) { clearDiff(); return; }
  document.getElementById('compareInput').click();
}

function handleCompareFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const other = JSON.parse(e.target.result);
      computeDiff(jsonData, other);
    } catch (err) { alert('Invalid JSON: ' + err.message); }
  };
  r.readAsText(file);
  document.getElementById('compareInput').value = '';
}

function computeDiff(a, b) {
  diffMap = new Map();
  function walk(va, vb, path) {
    const ps = path.join('.');
    if (va === undefined && vb !== undefined) { diffMap.set(ps, 'added'); return; }
    if (vb === undefined && va !== undefined) { diffMap.set(ps, 'removed'); return; }
    const ta = getType(va), tb = getType(vb);
    if (ta !== tb) { diffMap.set(ps, 'changed'); return; }
    if (ta === 'object') {
      const keys = new Set([...Object.keys(va), ...Object.keys(vb)]);
      let anyChild = false;
      keys.forEach(k => {
        const before = diffMap.size;
        walk(va[k], vb[k], [...path, k]);
        if (diffMap.size > before) anyChild = true;
      });
      if (anyChild) diffMap.set(ps, diffMap.get(ps) || 'changed');
    } else if (ta === 'array') {
      const len = Math.max(va.length, vb.length);
      let anyChild = false;
      for (let i = 0; i < len; i++) {
        const before = diffMap.size;
        walk(va[i], vb[i], [...path, i]);
        if (diffMap.size > before) anyChild = true;
      }
      if (anyChild) diffMap.set(ps, diffMap.get(ps) || 'changed');
    } else if (va !== vb) {
      diffMap.set(ps, 'changed');
    }
  }
  walk(a, b, []);
  let count = 0;
  allLines.forEach(line => {
    const cls = diffMap.get(line._pathStr);
    if (cls) { line.classList.add('diff-' + cls); count++; expandToLine(line); }
  });
  const sd = document.getElementById('statDiff');
  sd.style.display = '';
  sd.textContent = `diff: ${count} changes (click Diff again to clear)`;
  showToast(`${count} differences`);
}

function clearDiff() {
  diffMap = null;
  document.querySelectorAll('.json-line').forEach(l => l.classList.remove('diff-added', 'diff-removed', 'diff-changed'));
  document.getElementById('statDiff').style.display = 'none';
  showToast('Diff cleared');
}

// ══════════════════════════════════════════
//  Statistics
// ══════════════════════════════════════════
function showStats() {
  if (!jsonData) return;
  const body = document.getElementById('statsBody');
  const stats = computeStats(jsonData);
  let html = '<div class="stats-grid">';
  html += '<div class="stats-card"><h4>Overview</h4>';
  html += `<div class="stats-row"><span class="k">Total nodes</span><span class="v">${stats.nodes.toLocaleString()}</span></div>`;
  html += `<div class="stats-row"><span class="k">Max depth</span><span class="v">${stats.maxDepth}</span></div>`;
  html += `<div class="stats-row"><span class="k">JSON size</span><span class="v">${formatSize(stats.jsonSize)}</span></div>`;
  html += `<div class="stats-row"><span class="k">Unique keys</span><span class="v">${stats.uniqueKeys}</span></div>`;
  html += '</div>';
  html += '<div class="stats-card"><h4>Type breakdown</h4>';
  const typeOrder = Object.entries(stats.types).sort((a,b) => b[1]-a[1]);
  typeOrder.forEach(([t, c]) => {
    const pct = (c / stats.nodes * 100).toFixed(1);
    html += `<div class="stats-row"><span class="k">${t}</span><span class="v">${c} (${pct}%)</span></div><div class="stats-bar"><div style="width:${pct}%"></div></div>`;
  });
  html += '</div>';
  html += '<div class="stats-card"><h4>Top keys</h4>';
  if (!stats.topKeys.length) html += '<div class="stats-row"><span class="k" style="color:var(--text-dim)">(no object keys)</span></div>';
  stats.topKeys.slice(0, 12).forEach(([k, c]) => {
    html += `<div class="stats-row"><span class="k">${esc(k)}</span><span class="v">${c}</span></div>`;
  });
  html += '</div>';
  html += '<div class="stats-card"><h4>Largest branches</h4>';
  if (!stats.topBranches.length) html += '<div class="stats-row"><span class="k" style="color:var(--text-dim)">(no branches)</span></div>';
  stats.topBranches.slice(0, 10).forEach(b => {
    const label = b.path || '(root)';
    html += `<div class="stats-row"><span class="k" style="font-family:monospace;font-size:10px" title="${esc(label)}">${esc(label.length > 40 ? '...' + label.slice(-40) : label)}</span><span class="v">${formatSize(b.size)}</span></div>`;
  });
  html += '</div>';
  html += '</div>';
  body.innerHTML = html;
  document.getElementById('statsModal').classList.add('show');
}

function computeStats(data) {
  let nodes = 0, maxDepth = 0;
  const types = {}, keyCount = {};
  const branches = [];
  function walk(v, d, path) {
    nodes++;
    if (d > maxDepth) maxDepth = d;
    const t = getType(v);
    types[t] = (types[t] || 0) + 1;
    if (t === 'object') {
      branches.push({ path: path.join('.'), size: JSON.stringify(v).length });
      Object.entries(v).forEach(([k, c]) => { keyCount[k] = (keyCount[k]||0)+1; walk(c, d + 1, [...path, k]); });
    } else if (t === 'array') {
      branches.push({ path: path.join('.'), size: JSON.stringify(v).length });
      v.forEach((c, i) => walk(c, d + 1, [...path, i]));
    }
  }
  walk(data, 0, []);
  return {
    nodes, maxDepth,
    jsonSize: JSON.stringify(data).length,
    types,
    uniqueKeys: Object.keys(keyCount).length,
    topKeys: Object.entries(keyCount).sort((a,b) => b[1]-a[1]),
    topBranches: branches.sort((a,b) => b.size - a.size),
  };
}

// ══════════════════════════════════════════
//  YAML / CSV export
// ══════════════════════════════════════════
function jsonToYaml(obj, indent) {
  indent = indent || 0;
  const ind = '  '.repeat(indent);
  if (obj === null) return 'null';
  if (obj === undefined) return '~';
  if (typeof obj === 'boolean' || typeof obj === 'number') return String(obj);
  if (typeof obj === 'string') {
    if (obj.includes('\n')) {
      return '|\n' + obj.split('\n').map(l => '  '.repeat(indent + 1) + l).join('\n');
    }
    if (/^[\s]|[\s]$|[:#&*!|>'"%@`,\[\]{}]|^(true|false|null|yes|no|on|off|~)$/i.test(obj) || /^-?\d/.test(obj) || obj === '') {
      return JSON.stringify(obj);
    }
    return obj;
  }
  if (Array.isArray(obj)) {
    if (!obj.length) return '[]';
    return obj.map(v => {
      if (v !== null && typeof v === 'object') {
        const inner = jsonToYaml(v, indent + 1);
        return ind + '-\n' + inner;
      }
      return ind + '- ' + jsonToYaml(v, 0);
    }).join('\n');
  }
  // object
  const keys = Object.keys(obj);
  if (!keys.length) return '{}';
  return keys.map(k => {
    const v = obj[k];
    const safeKey = /[\s:#&*!|>'"%@`,\[\]{}]/.test(k) ? JSON.stringify(k) : k;
    if (v !== null && typeof v === 'object' && (Array.isArray(v) ? v.length : Object.keys(v).length)) {
      return ind + safeKey + ':\n' + jsonToYaml(v, indent + 1);
    }
    return ind + safeKey + ': ' + jsonToYaml(v, 0);
  }).join('\n');
}

function jsonToCsv(arr) {
  if (!Array.isArray(arr) || !arr.length) return '';
  const allObjs = arr.every(x => x && typeof x === 'object' && !Array.isArray(x));
  if (!allObjs) return arr.map(csvCell).join('\n');
  const keySet = new Set();
  arr.forEach(o => Object.keys(o).forEach(k => keySet.add(k)));
  const keys = [...keySet];
  const header = keys.map(csvCell).join(',');
  const rows = arr.map(o => keys.map(k => csvCell(o[k])).join(','));
  return [header, ...rows].join('\n');
}
function csvCell(v) {
  if (v === null || v === undefined) return '';
  if (typeof v === 'object') v = JSON.stringify(v);
  v = String(v);
  if (/[",\n]/.test(v)) return '"' + v.replace(/"/g, '""') + '"';
  return v;
}
